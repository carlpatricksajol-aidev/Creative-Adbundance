<!DOCTYPE html><html><head><meta charset="utf-8"><title>Upstack Ad 3</title><style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:1080px;height:1080px;overflow:hidden;}
body{font-family:"Segoe UI",system-ui,-apple-system,Arial,sans-serif;-webkit-font-smoothing:antialiased;
  --indigo:#5B4BE6;--indigo2:#4A38D6;--navy:#0F1733;--lav:#ECEBF6;--ink:#15172B;--gray:#6E7386;
  --green:#1FA85C;--red:#E5484D;--card:#FFFFFF;--meta:#0866FF;--shop:#5E8E3E;}
.ad{width:1080px;height:1080px;position:relative;overflow:hidden;display:flex;flex-direction:column;
  padding:78px 74px;}
.ad.lav{background:radial-gradient(120% 90% at 50% 0%,#F4F3FB 0%,var(--lav) 60%,#E4E2F2 100%);}
.ad.navy{background:radial-gradient(120% 90% at 50% -10%,#1B2550 0%,var(--navy) 65%,#0A1029 100%);}
.center{align-items:center;text-align:center;}
.logo{display:flex;align-items:center;gap:14px;}
.logo svg{width:44px;height:44px;}
.logo .wm{font-weight:800;font-size:26px;letter-spacing:-.5px;color:var(--ink);}
.logo .wm.lt{color:#fff;}
.logo .wm b{color:var(--indigo);}
.eyebrow{font-weight:800;font-size:22px;letter-spacing:3px;text-transform:uppercase;color:var(--indigo);}
.eyebrow.lt{color:#8E9BFF;}
h1{font-weight:800;letter-spacing:-2.4px;line-height:1.02;color:var(--ink);}
h1.lt{color:#fff;}
.ac{color:var(--indigo);}
.ac.lt{color:#9E90FF;}
.sub{font-weight:500;color:var(--gray);line-height:1.34;}
.sub.lt{color:#AEB4CC;}
.grow{flex:1;}
.row{display:flex;align-items:center;justify-content:center;gap:26px;}
.card{background:var(--card);border-radius:30px;box-shadow:0 24px 60px rgba(15,23,51,.12);}
.pill{display:inline-flex;align-items:center;justify-content:center;border-radius:999px;font-weight:800;}
.cta{background:var(--indigo);color:#fff;font-size:34px;padding:30px 54px;border-radius:999px;font-weight:800;
  box-shadow:0 18px 40px rgba(91,75,230,.40);letter-spacing:-.3px;}
.cta.out{background:transparent;color:var(--indigo);border:3px solid var(--indigo);box-shadow:none;}
.tile{width:96px;height:96px;border-radius:26px;display:flex;align-items:center;justify-content:center;}
.badge{position:absolute;top:-16px;right:-16px;background:var(--red);color:#fff;font-weight:800;font-size:26px;
  width:58px;height:58px;border-radius:999px;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 20px rgba(229,72,77,.4);}
.loss{background:#FDECEC;color:var(--red);font-weight:800;border-radius:999px;padding:12px 22px;font-size:24px;white-space:nowrap;}
.dot{width:12px;height:12px;border-radius:999px;display:inline-block;}
.up{color:var(--green);font-weight:800;}
</style></head><body><div class="ad lav center">
  <h1 style="font-size:74px;margin-top:8px;">Meta sees $12K.<br><span class="ac">You made $20K.</span></h1>
  <p class="sub" style="font-size:29px;margin-top:24px;max-width:840px;">Meta&rsquo;s pixel misses up to <b style="color:var(--ink);">40% of purchases</b> &mdash; so it optimizes on half the story and wastes your budget.</p>
  <div class="grow"></div>
  <div class="row">
    <div class="card" style="padding:40px 40px;width:320px;">
      <div style="display:flex;align-items:center;gap:14px;justify-content:center;"><div class="tile" style="width:60px;height:60px;border-radius:16px;background:#E7F0FF" style="background:#E7F0FF"><svg width="34" height="22" viewBox="0 0 52 34"><path d="M8 4c-4 0-6 4-6 13s2 13 6 13c3 0 5-3 8-8l4-7c2-4 3-5 5-5s3 1 5 5l4 7c3 5 5 8 8 8 4 0 6-4 6-13S48 4 44 4c-3 0-6 3-9 9l-4 7c-2 3-3 4-5 4s-3-1-5-4l-4-7c-3-6-6-9-9-9z" stroke="#0866FF" stroke-width="4" fill="none" stroke-linejoin="round"/></svg></div></div>
      <div style="font-size:60px;font-weight:800;margin-top:16px;color:var(--ink);">$12K</div>
      <div class="sub" style="font-size:22px;">Meta Ads Manager</div>
    </div>
    <div class="loss" style="font-size:26px;">$8K<br>invisible</div>
    <div class="card" style="padding:40px 40px;width:320px;">
      <div style="display:flex;align-items:center;gap:14px;justify-content:center;"><div class="tile" style="width:60px;height:60px;border-radius:16px;background:#EAF3E0" style="background:#EAF3E0"><svg width="30" height="34" viewBox="0 0 46 52"><path d="M31 11c0-4-2-8-6-8-3 0-5 3-6 7-3 1-6 2-6 2l-1 30 26 4 3-33s-6-2-4-2z" fill="#5E8E3E"/><path d="M23 20c-3 0-5 2-5 5s3 4 5 5 3 2 3 4-2 3-4 3-4-1-5-2" stroke="#fff" stroke-width="3" fill="none"/></svg></div></div>
      <div style="font-size:60px;font-weight:800;margin-top:16px;color:var(--green);">$20K</div>
      <div class="sub" style="font-size:22px;">Shopify orders</div>
    </div>
  </div>
  <div class="grow"></div>
  <p class="sub" style="font-size:28px;color:var(--ink);font-weight:600;max-width:820px;">Upstack recovers the invisible purchases &mdash; server-side, live in minutes.</p>
  <div class="cta" style="margin-top:32px;">Fix your tracking free</div>
</div></body></html>
